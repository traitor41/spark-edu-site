        // --- PART 1: MULTIPLE CHOICE ---
        function Part1({ data, goBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            const currentQ = data[currentIndex];

            const handleSelect = (index) => {
                if (selectedOption !== null || showAnswer) return;
                setSelectedOption(index);
                if (index === currentQ.answer) {
                    setScore(prev => prev + 1);
                }
            };

            const handleShowAnswer = () => {
                setShowAnswer(true);
            };

            const handleNext = () => {
                if (currentIndex < data.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setShowAnswer(false);
                } else {
                    setIsFinished(true);
                }
            };

            if (isFinished) return <ResultScreen score={score} total={data.length} onRetry={goBack} onMenu={goBack} />;

            return (
                <div className="max-w-xl mx-auto w-full flex flex-col items-center mt-6 px-4">
                    <Header titleId="Bagian 1: Pilihan Ganda" titleZh="第一部分：选择题" current={currentIndex} total={data.length} onBack={goBack} />
                    
                    <div className="bg-white w-full rounded-3xl shadow-lg p-6 md:p-8 border border-slate-100">
                        <div className="text-center mb-8">
                            <span className="inline-block bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold uppercase mb-4">Pilih Terjemahan / 选择翻译</span>
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-800">{currentQ.zh}</h2>
                        </div>

                        <div className="space-y-3">
                            {currentQ.options.map((opt, idx) => {
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 font-medium transition-all ";
                                
                                if (showAnswer && idx === currentQ.answer) {
                                    btnClass += "border-green-500 bg-green-50 text-green-700";
                                } else if (selectedOption === null && !showAnswer) {
                                    btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                                } else if (idx === currentQ.answer && selectedOption !== null) {
                                    btnClass += "border-green-500 bg-green-50 text-green-700";
                                } else if (idx === selectedOption) {
                                    btnClass += "border-red-500 bg-red-50 text-red-700";
                                } else {
                                    btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                                }

                                return (
                                    <button key={idx} onClick={() => handleSelect(idx)} className={btnClass} disabled={selectedOption !== null || showAnswer}>
                                        <div className="flex items-center justify-between">
                                            <span>{opt}</span>
                                            {((selectedOption !== null && idx === currentQ.answer) || (showAnswer && idx === currentQ.answer)) && <CheckCircle2 className="w-5 h-5 text-green-500" />}
                                            {selectedOption === idx && idx !== currentQ.answer && <XCircle className="w-5 h-5 text-red-500" />}
                                        </div>
                                    </button>
                                );

            const [activeData, setActiveData] = useState([]);

            const startPart = (partNum, sourceData) => {
                // Acak urutan soal sebelum mulai (Randomize on every play)
                const randomizedData = shuffleArray(sourceData);
                setActiveData(randomizedData);
                setView(`part${partNum}`);
            };

            const goBackToMenu = () => {
                setView('menu');
                setActiveData([]);
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-10">
                    <AppHeader />
                    
                    {view === 'menu' && (
                        <div className="max-w-md mx-auto w-full mt-10 px-4">
                            <div className="text-center mb-10">
                                <h1 className="text-3xl font-bold text-slate-900 mb-2">Pilih Latihan</h1>
                                <h2 className="text-xl font-medium text-slate-500">请选择练习项目</h2>
                            </div>

                            <div className="space-y-4">
                                <button onClick={() => startPart(1, part1Source)} className="w-full flex items-center gap-4 bg-white hover:bg-blue-50 p-5 rounded-2xl shadow-sm border border-slate-100 transition-all active:scale-95 group">
                                    <div className="bg-blue-100 p-3 rounded-xl group-hover:bg-blue-600 transition-colors">
                                        <BookOpen className="w-6 h-6 text-blue-600 group-hover:text-white" />
                                    </div>
                                    <div className="text-left flex-1">
                                        <h3 className="font-bold text-lg text-slate-800">Bagian 1: Pilihan Ganda</h3>
                                        <p className="text-slate-500 text-sm">第一部分：选择题 (20 Soal Acak)</p>
                                    </div>
                                    <ArrowRight className="w-5 h-5 text-slate-300 group-hover:text-blue-600" />
                                </button>

                                <button onClick={() => startPart(2, part2Source)} className="w-full flex items-center gap-4 bg-white hover:bg-emerald-50 p-5 rounded-2xl shadow-sm border border-slate-100 transition-all active:scale-95 group">
                                    <div className="bg-emerald-100 p-3 rounded-xl group-hover:bg-emerald-600 transition-colors">
                                        <Headphones className="w-6 h-6 text-emerald-600 group-hover:text-white" />
                                    </div>
                                    <div className="text-left flex-1">
                                        <h3 className="font-bold text-lg text-slate-800">Bagian 2: Isi Titik (Suara)</h3>
                                        <p className="text-slate-500 text-sm">第二部分：语音填空 (20 Soal Acak)</p>
                                    </div>
                                    <ArrowRight className="w-5 h-5 text-slate-300 group-hover:text-emerald-600" />
                                </button>

                                <button onClick={() => startPart(3, part3Source)} className="w-full flex items-center gap-4 bg-white hover:bg-purple-50 p-5 rounded-2xl shadow-sm border border-slate-100 transition-all active:scale-95 group">
                                    <div className="bg-purple-100 p-3 rounded-xl group-hover:bg-purple-600 transition-colors">
                                        <MessageCircle className="w-6 h-6 text-purple-600 group-hover:text-white" />
                                    </div>
                                    <div className="text-left flex-1">
                                        <h3 className="font-bold text-lg text-slate-800">Bagian 3: Latihan Bicara</h3>
                                        <p className="text-slate-500 text-sm">第三部分：口语练习 (20 Soal Acak)</p>
                                    </div>
                                    <ArrowRight className="w-5 h-5 text-slate-300 group-hover:text-purple-600" />
                                </button>

                                <button onClick={() => startPart(4, part4Source)} className="w-full flex items-center gap-4 bg-white hover:bg-orange-50 p-5 rounded-2xl shadow-sm border border-slate-100 transition-all active:scale-95 group">
                                    <div className="bg-orange-100 p-3 rounded-xl group-hover:bg-orange-600 transition-colors">
                                        <Languages className="w-6 h-6 text-orange-600 group-hover:text-white" />
                                    </div>
                                    <div className="text-left flex-1">
                                        <h3 className="font-bold text-lg text-slate-800">Bagian 4: Terjemahkan</h3>
                                        <p className="text-slate-500 text-sm">第四部分：口语翻译 (20 Soal Acak)</p>
                                    </div>
                                    <ArrowRight className="w-5 h-5 text-slate-300 group-hover:text-orange-600" />
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'part1' && <Part1 data={activeData} goBack={goBackToMenu} />}
                    {view === 'part2' && <Part2 data={activeData} goBack={goBackToMenu} />}
                    {view === 'part3' && <Part3 data={activeData} goBack={goBackToMenu} />}
                    {view === 'part4' && <Part4 data={activeData} goBack={goBackToMenu} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
